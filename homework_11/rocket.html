<!DOCTYPE html>
<html lang="uk">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/rocket-style.css">
	<link rel="stylesheet" href="css/reset.css">
	<title>Ракета</title>
</head>

<body>
	<div class="wrapper">
		<main>
			<div class="space">
				<div class="stars">
					<div class="star star-1"></div>
					<div class="star star-2"></div>
					<div class="star star-3"></div>
					<div class="star star-4"></div>
					<div class="star star-5"></div>
					<div class="star star-6"></div>
					<div class="star star-7"></div>
					<div class="star star-8"></div>
					<div class="star star-9"></div>
					<div class="star star-10"></div>
					<div class="star star-11"></div>
					<div class="star star-12"></div>
					<div class="star star-13"></div>
					<div class="star star-14"></div>
					<div class="star star-15"></div>
				</div>
				<div class="rocket">
					<div class="rocket-nose"></div>
					<div class="rocket-body">
						<div class="rocket-stripe" id='stripe-top'></div>
						<div class="rocket-window"></div>
						<div class="rocket-stripe"></div>
						<div class="rocket-stripe" id='stripe'></div>
					</div>
					<div class="rocket-fin rocket-fin-left"></div>
					<div class="rocket-fin rocket-fin-right"></div>
					<div class="rocket-engine"></div>
					<div class="rocket-engine" id='button'></div>
					<div class="rocket-fire"></div>
				</div>
			</div>
		</main>
	</div>
</body>

</html>
